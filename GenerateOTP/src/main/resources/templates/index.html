<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
</head>
<body>

<form action="/register" method="post">

    <label>Name:</label>
    <input type="text" name="name" required="required"> <br><br>

    <label>Phone Number:</label>
    <input type="number" name="phone" required="required"> <br><br>

    <label>Email ID:</label>
    <input type="email" name="emailId" required="required"> <br><br>

    <label>Password:</label>
    <input type="password" name="password" required="required"> <br><br>

    <button type="submit">SignUp</button>
</form>

<a href="/login">Already Signed Up? Click here to Login</a>

</body>
</html>
